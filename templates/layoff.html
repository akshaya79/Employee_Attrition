<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layoff Predictor</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            margin: 0;
        }

        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #333;
        }

        .card {
            background: white;
            padding: 20px;
            margin-top: 20px;
            border-radius: 10px;
            box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
        }

        .row {
            display: flex;
            flex-wrap: wrap;
        }

        .col {
            width: 48%;
            margin: 1%;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 20px;
            cursor: pointer;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
        }

        canvas {
            margin-top: 30px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Employee Layoff Prediction</h2>

    <div class="card">
        <form action="/layoff_predict" method="POST">

            <div class="row">

                <div class="col">
                    <label>Age</label>
                    <input type="number" name="Age" required>
                </div>

                <div class="col">
                    <label>Monthly Income</label>
                    <input type="number" name="MonthlyIncome" required>
                </div>

                <div class="col">
                    <label>Performance Rating</label>
                    <input type="number" name="PerformanceRating" required>
                </div>

                <div class="col">
                    <label>Years at Company</label>
                    <input type="number" name="YearsAtCompany" required>
                </div>

                <div class="col">
                    <label>Job Satisfaction</label>
                    <input type="number" name="JobSatisfaction" required>
                </div>

                <div class="col">
                    <label>OverTime</label>
                    <select name="OverTime">
                        <option value="1">Yes</option>
                        <option value="0">No</option>
                    </select>
                </div>

                <div class="col">
                    <label>Company Revenue Drop</label>
                    <input type="number" name="CompanyRevenueDrop" required>
                </div>

                <div class="col">
                    <label>Department Budget Cut</label>
                    <input type="number" name="DepartmentBudgetCut" required>
                </div>

            </div>

            <button type="submit">Predict Layoff</button>

        </form>

        <!-- Prediction Result -->
        {% if prediction %}
        <div class="result">
            {{ prediction }}
        </div>
        {% endif %}

        <!-- Graph -->
        <canvas id="riskChart"></canvas>

    </div>

</div>

<script>
    {% if prediction %}
        let riskValue = "{{ prediction }}".includes("High") ? 80 : 20;

        const ctx = document.getElementById('riskChart').getContext('2d');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Layoff Risk'],
                datasets: [{
                    label: 'Risk %',
                    data: [riskValue]
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    {% endif %}
</script>

</body>
</html>
